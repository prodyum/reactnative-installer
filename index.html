<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <title>reactnative Installer</title>
    <style>
      :root { color: #172033; background: #eef2f7; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      main { width: min(680px, 100%); display: grid; gap: 18px; }
      header { display: flex; gap: 16px; align-items: center; }
      img { width: 72px; height: 72px; border-radius: 8px; }
      h1 { margin: 0; font-size: clamp(2rem, 8vw, 4rem); line-height: 1; color: #0f172a; }
      p { margin: 0; color: #475569; line-height: 1.55; }
      .panel { border: 1px solid #d6dce6; border-radius: 8px; background: #fff; padding: 18px; display: grid; gap: 14px; box-shadow: 0 10px 30px rgb(15 23 42 / 8%); }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; }
      a { min-height: 44px; border-radius: 8px; padding: 0 16px; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; text-decoration: none; }
      .primary { background: #0f172a; color: #fff; }
      .secondary { background: #e2e8f0; color: #172033; }
      code { overflow-wrap: anywhere; color: #0f766e; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img src="assets/icon-192.png" alt="">
        <div><p>iOS test kurulumu</p><h1>reactnative</h1></div>
      </header>
      <section class="panel">
        <p>Bu sayfayi kayitli UDID'ye sahip iPhone uzerinde Safari ile acin. Kurulum Ad Hoc imzali IPA ve Apple OTA manifest uzerinden baslatilir.</p>
        <div class="actions">
          <a class="primary" href="itms-services://?action=download-manifest&amp;url=https%3A%2F%2Fprodyum.github.io%2Freactnative-installer%2Fmanifest.plist">iPhone'a kur</a>
          <a class="secondary" href="ipa/reactnative-install.ipa">IPA indir</a>
          <a class="secondary" href="manifest.plist">Manifest</a>
        </div>
        <p>Bundle: <code>com.prodyum.reactnative</code></p>
        <p>Version: <code>1.0.0.1</code></p>
      </section>
    </main>
  </body>
</html>
